# Example: evaluate with a local Ollama model
#
# Usage:
#   luau-bench run --provider ollama --model codellama \
#       --include-path ./my_tasks
#
# All settings below are the CLI defaults — shown here for reference.
# Every option can be passed directly as a CLI flag; no config file is required.

[model]
provider = "ollama"
model_name = "codellama"
base_url = "http://localhost:11434"
temperature = 0.0
max_tokens = 4096

[run]
num_samples = 1
parallel = 1
task_parallel = 4
